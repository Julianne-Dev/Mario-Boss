<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario & Luigi Pro | Interativo</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <main class="caixa-mae">
        <div class="video-container">
            <div class="overlay"></div>
            <video src="./img/video.mp4" autoplay muted loop></video>
        </div>

        <section class="caixa-principal" id="card">
            <div class="bloco-interrogacao" id="bloco-q">?</div>

            <img src="./img/logo.png" alt="logo mario" class="logo-mario-luigi">
            
            <div class="conteudo">
                <h1>Mário & Luigi</h1>
                <p class="subtitulo">Problemas Hidráulicos? Nós Resolvemos!</p>
                <button class="btn-contato" id="btn-contato">ENTRE EM CONTATO</button>
            </div>

            <div class="personagens">
                <img src="./img/mario.png" alt="mario" class="mario-img">
            </div>
        </section>
    </main>

    <audio id="som-moeda" src="https://www.myinstants.com/media/sounds/mario-coin.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
